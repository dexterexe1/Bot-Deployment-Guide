<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>United Bunnies Dashboard</title>
    <meta name="description" content="United Bunnies Dashboard — manage your Discord server." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="United Bunnies Dashboard" />
    <meta property="og:description" content="United Bunnies — Discord server management dashboard." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Persist theme: default to dark for a Discord-style dashboard
      try {
        var t = localStorage.getItem('theme');
        var d = t === 'dark' || !t; // default dark
        document.documentElement.classList.toggle('dark', d);
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
